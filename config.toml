baseURL = "https://sanazmhd.github.io/"
title = "Sanaz’s Blog"
theme = "PaperMod"
languageCode = "en-us"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = true
publishDir = "docs"

[params]
  ShowLangToggle = true
  ShowReadingTime = true
  profileMode = true

[languages]

  [languages.en]
    languageName = "English"
    weight = 1
    contentDir = "content/en"
    title = "Sanaz’s Blog"

    [languages.en.params]
      homeInfoParams = { Title = "Hi 👋", Content = "Welcome to my blog!" }
      profileMode = true

      [languages.en.params.profileMode]
        enabled = true
        title = "Sanaz 👩‍💻"
        subtitle = "Exploring code, books & Persian music"
        imageUrl = "/images/sanaz.jpg"
        imageTitle = "Sanaz's Profile Photo"
        imageWidth = 120
        imageHeight = 120
        buttons = [
          { name = "📚 Blog", url = "/blog/" },
          { name = "🛠️ Projects", url = "/projects/" },
          { name = "📖 Books", url = "/books/" }
        ]

    [[languages.en.menu.main]]
      identifier = "tutorials"
      name = "Tutorials"
      url = "/tutorials/"
      weight = 1

    [[languages.en.menu.main]]
      identifier = "projects"
      name = "Projects"
      url = "/projects/"
      weight = 2

    [[languages.en.menu.main]]
      identifier = "blog"
      name = "Blog"
      url = "/blog/"
      weight = 3

    [[languages.en.menu.main]]
      identifier = "books"
      name = "Books"
      url = "/books/"
      weight = 4

  [languages.fa]
    languageName = "فارسی"
    weight = 2
    contentDir = "content/fa"
    title = "وبلاگ ساناز"
    languagedirection = "rtl"

    [languages.fa.params]
      homeInfoParams = { Title = "سلام 👋", Content = "به وبلاگ من خوش آمدید!" }
      profileMode = true

      [languages.fa.params.profileMode]
        enabled = true
        title = "ساناز 🎶"
        subtitle = "یادگیری، کدنویسی، و موسیقی سنتی ایرانی"
        imageUrl = "/images/sanaz.jpg"
        imageTitle = "عکس پروفایل ساناز"
        imageWidth = 120
        imageHeight = 120
        buttons = [
          { name = "📚 وبلاگ", url = "/fa/blog/" },
          { name = "🛠️ پروژه‌ها", url = "/fa/projects/" },
          { name = "📖 کتاب‌ها", url = "/fa/books/" }
        ]

    [[languages.fa.menu.main]]
      identifier = "tutorials"
      name = "آموزش‌ها"
      url = "/fa/tutorials/"
      weight = 1

    [[languages.fa.menu.main]]
      identifier = "projects"
      name = "پروژه‌ها"
      url = "/fa/projects/"
      weight = 2

    [[languages.fa.menu.main]]
      identifier = "blog"
      name = "وبلاگ"
      url = "/fa/blog/"
      weight = 3

    [[languages.fa.menu.main]]
      identifier = "books"
      name = "کتاب‌ها"
      url = "/fa/books/"
      weight = 4

