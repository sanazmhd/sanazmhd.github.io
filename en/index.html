<!DOCTYPE html>
<html lang="en">
<head>
    <title>My Website - English Version</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Description of your website.">
    <link rel="canonical" href="https://sanazmhd.github.io/en/" />
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #f8f8f8;
            padding: 20px;
            text-align: center;
        }

        nav {
            background-color: #333;
            color: #fff;
        }

        nav ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        nav ul li {
            margin: 0 15px;
        }

        nav ul li a {
            color: #ff6600; /* Distinct color for the link */
            text-decoration: none;
            padding: 10px 20px;
            display: inline-block;
            font-weight: bold; /* Make text bold */
            border: 2px solid #ff6600;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s; /* Smooth transition for hover effect */
        }

        nav ul li a:hover {
            background-color: #ff6600; /* Change background on hover */
            color: #fff; /* Change text color on hover */
        }

        main {
            padding: 20px;
            text-align: center;
        }

        footer {
            background-color: #f8f8f8;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Website - English Version</h1>
    </header>
    <nav>
        <ul>
            <li><a href="/en/post/learning/learning.html">Learning ASP.NET by Dofactory</a></li>
            <!-- Add more links as needed -->
        </ul>
    </nav>
    <main>
        <p>Main content of the English version goes here.</p>
    </main>
    <footer>
        <p>Footer content here.</p>
    </footer>
</body>
</html>
